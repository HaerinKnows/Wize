services:
  - type: web
    name: wizenance-sms-gateway
    runtime: node
    plan: free
    buildCommand: npm install --omit=dev
    startCommand: node server/sms-gateway/server.mjs
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20.19.4
      - key: RESEND_API_KEY
        sync: false
      - key: OTP_ALLOWED_ORIGIN
        value: "*"
      - key: OTP_TTL_MS
        value: "300000"
      - key: OTP_REQUEST_WINDOW_MS
        value: "900000"
      - key: OTP_REQUEST_LIMIT_MAX
        value: "5"
      - key: OTP_VERIFY_WINDOW_MS
        value: "900000"
      - key: OTP_VERIFY_LIMIT_MAX
        value: "10"
      - key: SYNC_DATA_DIR
        value: "server/sms-gateway/data/sync"
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIRESTORE_SYNC_COLLECTION
        value: "userSyncSnapshots"
      - key: FIRESTORE_USERS_COLLECTION
        value: "authUsers"
      - key: FIRESTORE_EMAIL_INDEX_COLLECTION
        value: "authEmailIndex"
